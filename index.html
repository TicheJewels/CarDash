<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>CarDash</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  :root {
    --bg: #f5f5f0;
    --surface: #ffffff;
    --surface2: #efefea;
    --text: #1a1a1a;
    --text2: #6b6b6b;
    --accent: #1db954;
    --accent2: #1565c0;
    --radius: 20px;
    --font: 'SF Pro Display', -apple-system, 'Helvetica Neue', sans-serif;
  }

  html, body {
    height: 100%; width: 100%;
    background: var(--bg);
    font-family: var(--font);
    overflow: hidden;
    user-select: none;
  }

  #app {
    display: grid;
    grid-template-rows: auto 1fr auto;
    height: 100vh;
    padding: 16px;
    gap: 14px;
  }

  /* TOP BAR */
  #topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 4px;
  }

  #clock {
    font-size: clamp(48px, 10vw, 72px);
    font-weight: 200;
    letter-spacing: -2px;
    color: var(--text);
    line-height: 1;
  }

  #date-label {
    font-size: 14px;
    color: var(--text2);
    font-weight: 400;
    margin-top: 4px;
    letter-spacing: 0.3px;
  }

  #status-icons {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 6px;
  }

  #battery-wrap {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 13px;
    color: var(--text2);
  }

  #battery-bar {
    width: 34px; height: 16px;
    border: 1.5px solid #aaa;
    border-radius: 4px;
    position: relative;
    display: flex;
    align-items: center;
    padding: 2px;
  }
  #battery-bar::after {
    content: '';
    position: absolute;
    right: -5px;
    top: 50%;
    transform: translateY(-50%);
    width: 3px; height: 8px;
    background: #aaa;
    border-radius: 0 2px 2px 0;
  }
  #battery-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 2px;
    transition: width 1s;
  }

  /* MIDDLE GRID */
  #middle {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
  }

  .card {
    background: var(--surface);
    border-radius: var(--radius);
    padding: 20px;
    display: flex;
    flex-direction: column;
  }

  /* SPOTIFY CARD */
  #spotify-card {
    grid-column: 1 / -1;
    flex-direction: row;
    gap: 18px;
    align-items: center;
    min-height: 120px;
  }

  #album-art {
    width: 80px; height: 80px;
    border-radius: 12px;
    background: var(--surface2);
    flex-shrink: 0;
    object-fit: cover;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  #album-art img {
    width: 100%; height: 100%;
    object-fit: cover;
    border-radius: 12px;
    display: none;
  }

  #album-placeholder {
    width: 36px; height: 36px;
    opacity: 0.2;
  }

  #track-info {
    flex: 1;
    min-width: 0;
  }

  #track-name {
    font-size: 16px;
    font-weight: 500;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  #track-artist {
    font-size: 13px;
    color: var(--text2);
    margin-top: 3px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  #progress-wrap {
    margin-top: 12px;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  #progress-bar-bg {
    height: 3px;
    background: var(--surface2);
    border-radius: 2px;
    overflow: hidden;
  }

  #progress-bar-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 2px;
    width: 0%;
    transition: width 1s linear;
  }

  #progress-times {
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    color: var(--text2);
  }

  #controls {
    display: flex;
    align-items: center;
    gap: 20px;
    margin-top: 8px;
  }

  .ctrl-btn {
    background: none;
    border: none;
    cursor: pointer;
    padding: 6px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s;
    -webkit-appearance: none;
  }

  .ctrl-btn:active { background: var(--surface2); }

  #play-btn {
    width: 48px; height: 48px;
    background: var(--text);
    border-radius: 50%;
  }
  #play-btn:active { opacity: 0.8; }
  #play-btn svg { color: white; }

  #spotify-login-overlay {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    width: 100%;
    padding: 8px 0;
  }

  #spotify-login-overlay p {
    font-size: 13px;
    color: var(--text2);
    text-align: center;
  }

  #login-btn {
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 50px;
    padding: 12px 28px;
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
    font-family: var(--font);
    -webkit-appearance: none;
  }

  #client-id-form {
    display: flex;
    flex-direction: column;
    gap: 10px;
    width: 100%;
    max-width: 340px;
  }

  #client-id-input {
    border: 1.5px solid #ddd;
    border-radius: 12px;
    padding: 10px 14px;
    font-size: 14px;
    font-family: var(--font);
    outline: none;
    color: var(--text);
    background: var(--surface2);
  }
  #client-id-input:focus { border-color: var(--accent); }

  #client-id-label {
    font-size: 12px;
    color: var(--text2);
    text-align: center;
  }

  /* MAPS CARD */
  #maps-card {
    justify-content: space-between;
    cursor: pointer;
    transition: transform 0.1s;
  }
  #maps-card:active { transform: scale(0.97); }

  #maps-icon-wrap {
    width: 52px; height: 52px;
    background: #e8f0fe;
    border-radius: 14px;
    display: flex; align-items: center; justify-content: center;
  }

  #maps-label {
    font-size: 16px;
    font-weight: 500;
    color: var(--text);
    margin-top: 12px;
  }
  #maps-sublabel {
    font-size: 12px;
    color: var(--text2);
    margin-top: 3px;
  }

  /* METEO PLACEHOLDER / extra card */
  #extra-card {
    justify-content: space-between;
  }

  #temp-display {
    font-size: 38px;
    font-weight: 200;
    color: var(--text);
  }
  #weather-desc {
    font-size: 13px;
    color: var(--text2);
  }
  #weather-icon-wrap {
    font-size: 32px;
    line-height: 1;
  }

  /* BOTTOM STATUS */
  #bottombar {
    display: flex;
    gap: 14px;
  }

  .pill {
    flex: 1;
    background: var(--surface);
    border-radius: 50px;
    padding: 10px 18px;
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    color: var(--text2);
  }

  .pill-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--accent);
    flex-shrink: 0;
  }

  /* SETUP SCREEN */
  #setup-screen {
    position: fixed;
    inset: 0;
    background: var(--bg);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 32px;
    gap: 16px;
    z-index: 100;
  }

  #setup-screen h1 {
    font-size: 28px;
    font-weight: 300;
    color: var(--text);
    letter-spacing: -0.5px;
  }

  #setup-screen p {
    font-size: 14px;
    color: var(--text2);
    text-align: center;
    line-height: 1.6;
    max-width: 320px;
  }

  #setup-input {
    width: 100%;
    max-width: 320px;
    border: 1.5px solid #ddd;
    border-radius: 14px;
    padding: 14px 18px;
    font-size: 15px;
    font-family: var(--font);
    outline: none;
    color: var(--text);
    background: white;
  }
  #setup-input:focus { border-color: var(--accent); }

  #setup-btn {
    background: var(--text);
    color: white;
    border: none;
    border-radius: 50px;
    padding: 14px 36px;
    font-size: 16px;
    font-weight: 400;
    cursor: pointer;
    font-family: var(--font);
    -webkit-appearance: none;
    width: 100%;
    max-width: 320px;
  }

  #setup-skip {
    font-size: 13px;
    color: var(--text2);
    cursor: pointer;
    text-decoration: underline;
    background: none;
    border: none;
    font-family: var(--font);
  }

  .setup-step { display: none; flex-direction: column; align-items: center; gap: 14px; width: 100%; }
  .setup-step.active { display: flex; }

  #setup-redirect-note {
    background: #fff;
    border-radius: 14px;
    padding: 14px 16px;
    font-size: 13px;
    color: var(--text2);
    max-width: 320px;
    width: 100%;
    line-height: 1.6;
  }
  #setup-redirect-note code {
    background: var(--surface2);
    padding: 2px 6px;
    border-radius: 6px;
    font-size: 12px;
    word-break: break-all;
  }

  .hidden { display: none !important; }
</style>
</head>
<body>

<!-- SETUP SCREEN -->
<div id="setup-screen">
  <div class="setup-step active" id="step-1">
    <h1>CarDash</h1>
    <p>Inserisci il tuo Spotify Client ID per connettere la musica.<br>Puoi ottenerlo su <strong>developer.spotify.com</strong></p>
    <div id="setup-redirect-note">
      Nel tuo Spotify Dashboard, aggiungi questo come <strong>Redirect URI</strong>:<br><br>
      <code id="redirect-uri-display"></code>
    </div>
    <input type="text" id="setup-input" placeholder="Client ID Spotify" autocomplete="off" autocorrect="off" spellcheck="false" />
    <button id="setup-btn" onclick="saveClientId()">Continua</button>
    <button id="setup-skip" onclick="skipSetup()">Continua senza Spotify</button>
  </div>
</div>

<!-- MAIN APP -->
<div id="app">
  <!-- TOP: Clock -->
  <div id="topbar">
    <div>
      <div id="clock">--:--</div>
      <div id="date-label"></div>
    </div>
    <div id="status-icons">
      <div id="battery-wrap">
        <span id="battery-pct">--%</span>
        <div id="battery-bar"><div id="battery-fill" style="width:50%"></div></div>
      </div>
    </div>
  </div>

  <!-- MIDDLE -->
  <div id="middle">

    <!-- SPOTIFY -->
    <div class="card" id="spotify-card">

      <!-- NOT LOGGED IN -->
      <div id="spotify-login-overlay">
        <p>Connetti Spotify</p>
        <button id="login-btn" onclick="startSpotifyAuth()">Accedi a Spotify</button>
      </div>

      <!-- LOGGED IN (hidden initially) -->
      <div id="spotify-player" class="hidden" style="display:flex;flex-direction:row;gap:18px;align-items:center;width:100%;">
        <div id="album-art">
          <svg id="album-placeholder" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="12" cy="12" r="10" stroke="#999" stroke-width="1.5"/>
            <circle cx="12" cy="12" r="3" fill="#999"/>
          </svg>
          <img id="album-img" src="" alt="" />
        </div>
        <div id="track-info" style="flex:1;min-width:0;">
          <div id="track-name">—</div>
          <div id="track-artist"></div>
          <div id="progress-wrap">
            <div id="progress-bar-bg"><div id="progress-bar-fill"></div></div>
            <div id="progress-times">
              <span id="prog-current">0:00</span>
              <span id="prog-total">0:00</span>
            </div>
          </div>
          <div id="controls">
            <button class="ctrl-btn" onclick="prevTrack()" title="Precedente">
              <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/></svg>
            </button>
            <button class="ctrl-btn" id="play-btn" onclick="togglePlay()">
              <svg id="play-icon" width="22" height="22" viewBox="0 0 24 24" fill="white"><path d="M8 5v14l11-7z"/></svg>
              <svg id="pause-icon" width="22" height="22" viewBox="0 0 24 24" fill="white" style="display:none"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
            </button>
            <button class="ctrl-btn" onclick="nextTrack()" title="Successivo">
              <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="m6 18 8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>
            </button>
          </div>
        </div>
      </div>

    </div>

    <!-- MAPS -->
    <div class="card" id="maps-card" onclick="openMaps()">
      <div id="maps-icon-wrap">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="#1565c0"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>
      </div>
      <div id="maps-label">Google Maps</div>
      <div id="maps-sublabel">Tocca per navigare</div>
    </div>

    <!-- WEATHER -->
    <div class="card" id="extra-card">
      <div id="weather-icon-wrap" id="wx-icon">🌤</div>
      <div>
        <div id="temp-display">--°</div>
        <div id="weather-desc">Caricamento…</div>
      </div>
    </div>

  </div>

  <!-- BOTTOM -->
  <div id="bottombar">
    <div class="pill">
      <div class="pill-dot" id="spotify-dot" style="background:#ccc"></div>
      <span id="spotify-status-text">Spotify non connesso</span>
    </div>
    <div class="pill" style="cursor:pointer;" onclick="openMaps()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="#1565c0"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/></svg>
      <span>Naviga</span>
    </div>
  </div>
</div>

<script>
const CLIENT_ID_KEY = 'cardash_client_id';
const TOKEN_KEY = 'cardash_token';
const EXPIRES_KEY = 'cardash_expires';
const VERIFIER_KEY = 'cardash_verifier';
const REDIRECT_URI = window.location.href.split('?')[0].split('#')[0];

let isPlaying = false;
let progressInterval = null;
let currentProgress = 0;
let currentDuration = 1;
let pollInterval = null;

// Show redirect URI in setup
document.getElementById('redirect-uri-display').textContent = REDIRECT_URI;

// ---- SETUP ----
function saveClientId() {
  const val = document.getElementById('setup-input').value.trim();
  if (!val) { alert('Inserisci il Client ID'); return; }
  localStorage.setItem(CLIENT_ID_KEY, val);
  document.getElementById('setup-screen').classList.add('hidden');
}

function skipSetup() {
  document.getElementById('setup-screen').classList.add('hidden');
}

// ---- CLOCK ----
function updateClock() {
  const now = new Date();
  const h = String(now.getHours()).padStart(2,'0');
  const m = String(now.getMinutes()).padStart(2,'0');
  document.getElementById('clock').textContent = h + ':' + m;
  const days = ['Dom','Lun','Mar','Mer','Gio','Ven','Sab'];
  const months = ['Gen','Feb','Mar','Apr','Mag','Giu','Lug','Ago','Set','Ott','Nov','Dic'];
  document.getElementById('date-label').textContent =
    days[now.getDay()] + ' ' + now.getDate() + ' ' + months[now.getMonth()];
}
updateClock();
setInterval(updateClock, 10000);

// ---- BATTERY ----
async function updateBattery() {
  if ('getBattery' in navigator) {
    try {
      const b = await navigator.getBattery();
      const pct = Math.round(b.level * 100);
      document.getElementById('battery-pct').textContent = pct + '%';
      document.getElementById('battery-fill').style.width = pct + '%';
      document.getElementById('battery-fill').style.background = pct < 20 ? '#e53935' : '#1db954';
    } catch(e) {}
  }
}
updateBattery();
setInterval(updateBattery, 60000);

// ---- WEATHER (Open-Meteo, no key needed) ----
async function loadWeather() {
  try {
    let lat = 37.5, lon = 15.1; // default Catania
    if (navigator.geolocation) {
      await new Promise(res => navigator.geolocation.getCurrentPosition(
        p => { lat = p.coords.latitude; lon = p.coords.longitude; res(); },
        () => res(), { timeout: 4000 }
      ));
    }
    const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true&hourly=precipitation_probability&forecast_days=1`;
    const r = await fetch(url);
    const d = await r.json();
    const temp = Math.round(d.current_weather.temperature);
    const wmo = d.current_weather.weathercode;
    document.getElementById('temp-display').textContent = temp + '°';
    document.getElementById('weather-desc').textContent = wmoDesc(wmo);
    document.getElementById('weather-icon-wrap').textContent = wmoIcon(wmo);
  } catch(e) {
    document.getElementById('weather-desc').textContent = 'Non disponibile';
  }
}

function wmoDesc(c) {
  if (c === 0) return 'Sereno';
  if (c <= 2) return 'Parz. nuvoloso';
  if (c <= 3) return 'Nuvoloso';
  if (c <= 49) return 'Nebbia';
  if (c <= 59) return 'Pioggerella';
  if (c <= 69) return 'Pioggia';
  if (c <= 79) return 'Neve';
  if (c <= 82) return 'Rovesci';
  return 'Temporale';
}
function wmoIcon(c) {
  if (c === 0) return '☀️';
  if (c <= 2) return '⛅';
  if (c <= 3) return '☁️';
  if (c <= 49) return '🌫';
  if (c <= 69) return '🌧';
  if (c <= 79) return '❄️';
  return '⛈';
}
loadWeather();

// ---- MAPS ----
function openMaps() {
  window.open('https://maps.google.com', '_blank');
}

// ---- SPOTIFY PKCE ----
function generateVerifier(len = 128) {
  const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789-._~';
  let v = '';
  const arr = new Uint8Array(len);
  crypto.getRandomValues(arr);
  arr.forEach(x => v += chars[x % chars.length]);
  return v;
}

async function generateChallenge(verifier) {
  const enc = new TextEncoder().encode(verifier);
  const hash = await crypto.subtle.digest('SHA-256', enc);
  return btoa(String.fromCharCode(...new Uint8Array(hash)))
    .replace(/=/g,'').replace(/\+/g,'-').replace(/\//g,'_');
}

async function startSpotifyAuth() {
  const clientId = localStorage.getItem(CLIENT_ID_KEY);
  if (!clientId) {
    const id = prompt('Inserisci il tuo Spotify Client ID:');
    if (!id) return;
    localStorage.setItem(CLIENT_ID_KEY, id.trim());
  }
  const verifier = generateVerifier();
  localStorage.setItem(VERIFIER_KEY, verifier);
  const challenge = await generateChallenge(verifier);
  const scopes = 'user-read-playback-state user-modify-playback-state user-read-currently-playing';
  const params = new URLSearchParams({
    client_id: localStorage.getItem(CLIENT_ID_KEY),
    response_type: 'code',
    redirect_uri: REDIRECT_URI,
    code_challenge_method: 'S256',
    code_challenge: challenge,
    scope: scopes
  });
  window.location.href = 'https://accounts.spotify.com/authorize?' + params.toString();
}

async function exchangeCode(code) {
  const verifier = localStorage.getItem(VERIFIER_KEY);
  const clientId = localStorage.getItem(CLIENT_ID_KEY);
  const body = new URLSearchParams({
    grant_type: 'authorization_code',
    code, redirect_uri: REDIRECT_URI,
    client_id: clientId,
    code_verifier: verifier
  });
  const r = await fetch('https://accounts.spotify.com/api/token', {
    method: 'POST',
    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
    body: body.toString()
  });
  const d = await r.json();
  if (d.access_token) {
    localStorage.setItem(TOKEN_KEY, d.access_token);
    localStorage.setItem(EXPIRES_KEY, Date.now() + d.expires_in * 1000);
    if (d.refresh_token) localStorage.setItem('cardash_refresh', d.refresh_token);
    history.replaceState({}, '', REDIRECT_URI);
    initSpotifyPlayer();
  }
}

async function refreshToken() {
  const rt = localStorage.getItem('cardash_refresh');
  const clientId = localStorage.getItem(CLIENT_ID_KEY);
  if (!rt || !clientId) return false;
  const body = new URLSearchParams({
    grant_type: 'refresh_token',
    refresh_token: rt,
    client_id: clientId
  });
  const r = await fetch('https://accounts.spotify.com/api/token', {
    method: 'POST',
    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
    body: body.toString()
  });
  const d = await r.json();
  if (d.access_token) {
    localStorage.setItem(TOKEN_KEY, d.access_token);
    localStorage.setItem(EXPIRES_KEY, Date.now() + d.expires_in * 1000);
    return true;
  }
  return false;
}

async function getToken() {
  const exp = parseInt(localStorage.getItem(EXPIRES_KEY) || '0');
  if (Date.now() > exp - 60000) {
    const ok = await refreshToken();
    if (!ok) return null;
  }
  return localStorage.getItem(TOKEN_KEY);
}

async function spotifyApi(method, endpoint, body) {
  const token = await getToken();
  if (!token) return null;
  const opts = { method, headers: { 'Authorization': 'Bearer ' + token } };
  if (body) { opts.body = JSON.stringify(body); opts.headers['Content-Type'] = 'application/json'; }
  const r = await fetch('https://api.spotify.com/v1' + endpoint, opts);
  if (r.status === 204 || r.status === 202) return {};
  if (r.ok) return r.json().catch(() => ({}));
  return null;
}

async function fetchNowPlaying() {
  const d = await spotifyApi('GET', '/me/player?additional_types=track');
  if (!d) return;
  updatePlayerUI(d);
}

function updatePlayerUI(d) {
  if (!d || !d.item) {
    document.getElementById('track-name').textContent = 'Nessun brano in riproduzione';
    document.getElementById('track-artist').textContent = '';
    return;
  }
  const item = d.item;
  document.getElementById('track-name').textContent = item.name;
  document.getElementById('track-artist').textContent = item.artists.map(a => a.name).join(', ');
  currentDuration = item.duration_ms;
  currentProgress = d.progress_ms;
  isPlaying = d.is_playing;

  const img = item.album.images[0]?.url;
  if (img) {
    document.getElementById('album-img').src = img;
    document.getElementById('album-img').style.display = 'block';
    document.getElementById('album-placeholder').style.display = 'none';
  }
  updatePlayPauseIcon();
  updateProgress();
  startProgressTick();

  document.getElementById('spotify-dot').style.background = '#1db954';
  document.getElementById('spotify-status-text').textContent = isPlaying ? 'In riproduzione' : 'In pausa';
}

function updateProgress() {
  const pct = currentDuration > 0 ? (currentProgress / currentDuration) * 100 : 0;
  document.getElementById('progress-bar-fill').style.width = pct + '%';
  document.getElementById('prog-current').textContent = msToMin(currentProgress);
  document.getElementById('prog-total').textContent = msToMin(currentDuration);
}

function msToMin(ms) {
  const s = Math.floor(ms / 1000);
  return Math.floor(s / 60) + ':' + String(s % 60).padStart(2,'0');
}

function startProgressTick() {
  if (progressInterval) clearInterval(progressInterval);
  if (!isPlaying) return;
  progressInterval = setInterval(() => {
    currentProgress = Math.min(currentProgress + 1000, currentDuration);
    updateProgress();
  }, 1000);
}

function updatePlayPauseIcon() {
  document.getElementById('play-icon').style.display = isPlaying ? 'none' : 'block';
  document.getElementById('pause-icon').style.display = isPlaying ? 'block' : 'none';
}

async function togglePlay() {
  if (isPlaying) {
    await spotifyApi('PUT', '/me/player/pause');
    isPlaying = false;
    if (progressInterval) clearInterval(progressInterval);
  } else {
    await spotifyApi('PUT', '/me/player/play');
    isPlaying = true;
    startProgressTick();
  }
  updatePlayPauseIcon();
  document.getElementById('spotify-status-text').textContent = isPlaying ? 'In riproduzione' : 'In pausa';
}

async function nextTrack() {
  await spotifyApi('POST', '/me/player/next');
  setTimeout(fetchNowPlaying, 600);
}

async function prevTrack() {
  await spotifyApi('POST', '/me/player/previous');
  setTimeout(fetchNowPlaying, 600);
}

function initSpotifyPlayer() {
  document.getElementById('spotify-login-overlay').classList.add('hidden');
  document.getElementById('spotify-player').classList.remove('hidden');
  document.getElementById('spotify-player').style.display = 'flex';
  fetchNowPlaying();
  pollInterval = setInterval(fetchNowPlaying, 10000);
}

// ---- INIT ----
window.addEventListener('load', () => {
  const clientId = localStorage.getItem(CLIENT_ID_KEY);

  // Check OAuth callback
  const params = new URLSearchParams(window.location.search);
  const code = params.get('code');
  if (code) {
    document.getElementById('setup-screen').classList.add('hidden');
    exchangeCode(code);
    return;
  }

  // Already have token?
  const token = localStorage.getItem(TOKEN_KEY);
  if (token && clientId) {
    document.getElementById('setup-screen').classList.add('hidden');
    initSpotifyPlayer();
    return;
  }

  // Show setup if no client ID
  if (!clientId) {
    document.getElementById('setup-screen').classList.remove('hidden');
  } else {
    document.getElementById('setup-screen').classList.add('hidden');
  }
});

// Keep screen awake (where supported)
if ('wakeLock' in navigator) {
  const requestWakeLock = async () => {
    try { await navigator.wakeLock.request('screen'); } catch(e) {}
  };
  requestWakeLock();
  document.addEventListener('visibilitychange', () => {
    if (document.visibilityState === 'visible') requestWakeLock();
  });
}
</script>
