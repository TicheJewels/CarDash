<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="CarDash">
<title>CarDash</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@200;300;400;500&family=DM+Mono:wght@300;400&display=swap');

*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

:root {
  --bg1: #0d0620;
  --bg2: #1a0a2e;
  --bg3: #061428;
  --bg4: #0a1f0d;
  --glass: rgba(255,255,255,0.07);
  --glass-border: rgba(255,255,255,0.18);
  --glass-highlight: rgba(255,255,255,0.28);
  --glass-shadow: rgba(0,0,0,0.5);
  --text: #ffffff;
  --text2: rgba(255,255,255,0.6);
  --text3: rgba(255,255,255,0.3);
  --accent: #30d158;
  --accent-blue: #0a84ff;
  --radius: 28px;
  --radius-sm: 18px;
  --font: 'DM Sans', -apple-system, sans-serif;
  --font-mono: 'DM Mono', monospace;
  --blur: blur(40px) saturate(220%) brightness(1.1);
  --btn-icon: #0d0620;
}

[data-theme="light"] {
  --glass: rgba(255,255,255,0.35);
  --glass-border: rgba(255,255,255,0.8);
  --glass-highlight: rgba(255,255,255,0.95);
  --glass-shadow: rgba(0,0,0,0.1);
  --text: #1a1a2e;
  --text2: rgba(20,20,50,0.65);
  --text3: rgba(20,20,50,0.38);
  --blur: blur(40px) saturate(180%) brightness(1.05);
  --btn-icon: #1a1a2e;
}

html, body {
  width: 100%; height: 100%;
  font-family: var(--font);
  overflow: hidden;
  -webkit-font-smoothing: antialiased;
}

body {
  background:
    radial-gradient(ellipse 80% 80% at 15% 50%, #2d1b69 0%, transparent 55%),
    radial-gradient(ellipse 60% 60% at 85% 20%, #0a2a5e 0%, transparent 50%),
    radial-gradient(ellipse 50% 70% at 80% 80%, #0d3318 0%, transparent 50%),
    radial-gradient(ellipse 40% 40% at 50% 50%, #1a0535 0%, transparent 60%),
    #070412;
  transition: background 0.8s ease;
}

[data-theme="light"] body {
  background:
    radial-gradient(ellipse 70% 70% at 10% 30%, #ffd580 0%, transparent 50%),
    radial-gradient(ellipse 80% 80% at 80% 20%, #87ceeb 0%, transparent 55%),
    radial-gradient(ellipse 60% 60% at 60% 90%, #b8e8c8 0%, transparent 50%),
    radial-gradient(ellipse 50% 50% at 30% 80%, #f0d8a0 0%, transparent 50%),
    #d4eef8;
}

/* Force landscape */
@media (orientation: portrait) {
  #rotate-msg { display: flex !important; }
  #app { display: none !important; }
  #setup-screen { display: none !important; }
}

#rotate-msg {
  display: none;
  position: fixed; inset: 0;
  background: #070412;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 16px;
  z-index: 9999;
}
#rotate-msg svg { opacity: 0.3; animation: rotateHint 2s ease-in-out infinite; }
@keyframes rotateHint {
  0%,100% { transform: rotate(0deg); }
  50% { transform: rotate(90deg); }
}
#rotate-msg p { font-size: 15px; color: rgba(255,255,255,0.4); font-weight: 300; }

/* LIQUID GLASS CARD */
.card {
  position: relative;
  border-radius: var(--radius);
  padding: 20px;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  animation: fadeUp 0.6s cubic-bezier(0.16,1,0.3,1) both;
  isolation: isolate;
  background: var(--glass);
  -webkit-backdrop-filter: var(--blur);
  backdrop-filter: var(--blur);
  border: 1px solid var(--glass-border);
  box-shadow:
    0 0 0 0.5px rgba(255,255,255,0.05) inset,
    0 8px 32px var(--glass-shadow),
    0 2px 8px rgba(0,0,0,0.3),
    inset 0 1.5px 0 var(--glass-highlight),
    inset 0 -1px 0 rgba(0,0,0,0.25);
}

/* Top specular highlight — simulates light hitting glass edge */
.card::before {
  content: '';
  position: absolute;
  top: 0; left: 8%; right: 8%;
  height: 1.5px;
  background: linear-gradient(90deg,
    transparent 0%,
    var(--glass-highlight) 25%,
    rgba(255,255,255,0.95) 50%,
    var(--glass-highlight) 75%,
    transparent 100%);
  z-index: 10;
  pointer-events: none;
  border-radius: 50%;
}

/* Internal glass sheen — diagonal refraction */
.card::after {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: var(--radius);
  background: linear-gradient(
    125deg,
    rgba(255,255,255,0.13) 0%,
    rgba(255,255,255,0.05) 30%,
    transparent 50%,
    rgba(255,255,255,0.02) 70%,
    rgba(255,255,255,0.07) 100%
  );
  pointer-events: none;
  z-index: 1;
}

.card > * { position: relative; z-index: 2; }

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(12px) scale(0.98); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}

/* MAIN LAYOUT */
#app {
  position: relative;
  z-index: 1;
  display: grid;
  grid-template-columns: 220px 1fr 180px;
  grid-template-rows: 1fr;
  gap: 14px;
  padding: 16px 20px;
  padding-left: max(20px, env(safe-area-inset-left));
  padding-right: max(20px, env(safe-area-inset-right));
  padding-top: max(16px, env(safe-area-inset-top));
  padding-bottom: max(16px, env(safe-area-inset-bottom));
  height: 100vh;
}

/* LEFT */
#left-col { display: flex; flex-direction: column; gap: 14px; }

#clock-card { flex: 1; animation-delay: 0.05s; justify-content: space-between; }

#clock-time {
  font-size: clamp(52px, 8vw, 72px);
  font-weight: 200;
  letter-spacing: -3px;
  color: var(--text);
  line-height: 1;
  font-variant-numeric: tabular-nums;
  text-shadow: 0 2px 20px rgba(255,255,255,0.15);
}
#clock-date {
  font-size: 13px; color: var(--text2);
  font-weight: 400; letter-spacing: 0.2px; margin-top: 6px;
}

/* THEME TOGGLE — liquid glass capsule */
#theme-toggle {
  margin-top: 14px;
  background: var(--glass);
  -webkit-backdrop-filter: var(--blur);
  backdrop-filter: var(--blur);
  border: 1px solid var(--glass-border);
  border-radius: 50px;
  padding: 5px;
  display: inline-flex;
  align-items: center;
  gap: 2px;
  cursor: pointer;
  box-shadow: inset 0 1px 0 var(--glass-highlight), 0 4px 12px var(--glass-shadow);
  position: relative;
  width: fit-content;
}

#theme-toggle::before {
  content: '';
  position: absolute;
  top: 0; left: 5%; right: 5%;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--glass-highlight), transparent);
  border-radius: 50%;
}

.theme-opt {
  width: 32px; height: 32px;
  border-radius: 50px;
  display: flex; align-items: center; justify-content: center;
  color: var(--text2);
  font-size: 15px;
  transition: all 0.3s cubic-bezier(0.34,1.56,0.64,1);
  position: relative;
  z-index: 1;
  flex-shrink: 0;
}

.theme-opt.active {
  color: var(--text);
}

#theme-knob {
  position: absolute;
  width: 32px; height: 32px;
  border-radius: 50px;
  background: rgba(255,255,255,0.15);
  -webkit-backdrop-filter: blur(20px);
  backdrop-filter: blur(20px);
  border: 1px solid rgba(255,255,255,0.35);
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.5), 0 2px 8px rgba(0,0,0,0.3);
  transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
  z-index: 0;
  pointer-events: none;
}

#battery-row {
  display: flex; align-items: center;
  gap: 8px; padding-top: 8px;
  justify-content: flex-end;
}
#battery-icon {
  width: 28px; height: 14px;
  border: 1.5px solid rgba(255,255,255,0.45);
  border-radius: 3px;
  position: relative;
  display: flex; align-items: center;
  padding: 2px;
}
#battery-icon::after {
  content: '';
  position: absolute;
  right: -5px; top: 50%;
  transform: translateY(-50%);
  width: 3px; height: 7px;
  background: rgba(255,255,255,0.45);
  border-radius: 0 2px 2px 0;
}
#battery-fill {
  height: 100%;
  background: var(--accent);
  border-radius: 1.5px;
  transition: width 2s ease;
}

#weather-card {
  animation-delay: 0.1s;
  padding: 16px 20px;
  flex-direction: row;
  align-items: center;
  gap: 14px;
  min-height: 80px;
  flex-shrink: 0;
}
#wx-icon { font-size: 28px; line-height: 1; flex-shrink: 0; }
#wx-temp {
  font-size: 26px; font-weight: 300;
  color: var(--text); letter-spacing: -1px; line-height: 1;
  text-shadow: 0 2px 12px rgba(255,255,255,0.2);
}
#wx-desc { font-size: 12px; color: var(--text2); margin-top: 3px; }

/* CENTER */
#center-col { display: flex; flex-direction: column; gap: 14px; }

#spotify-card { flex: 1; animation-delay: 0.15s; }

#spotify-login-state {
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  height: 100%; gap: 14px;
}
#spotify-login-state p { font-size: 14px; color: var(--text2); font-weight: 300; }

/* LIQUID GLASS BUTTON — login */
#login-btn {
  background: rgba(29,185,84,0.2);
  -webkit-backdrop-filter: blur(20px);
  backdrop-filter: blur(20px);
  border: 1px solid rgba(29,185,84,0.5);
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.3), 0 4px 16px rgba(29,185,84,0.2);
  color: #30d158;
  border-radius: 50px;
  padding: 12px 32px;
  font-size: 15px; font-weight: 400;
  cursor: pointer; font-family: var(--font);
  transition: all 0.2s; -webkit-appearance: none;
  position: relative; overflow: hidden;
}
#login-btn::before {
  content: '';
  position: absolute;
  top: 0; left: 10%; right: 10%; height: 1px;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.6), transparent);
}
#login-btn:active { transform: scale(0.96); }

#spotify-player {
  display: none; flex-direction: column;
  align-items: center; gap: 14px; height: 100%; width: 100%;
}

#album-wrap {
  width: 100%; aspect-ratio: 1; max-height: 45%;
  flex-shrink: 0; border-radius: 18px;
  background: rgba(255,255,255,0.05);
  overflow: hidden;
  box-shadow: 0 8px 32px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.2);
  display: flex; align-items: center; justify-content: center;
}
#album-img { width: 100%; height: 100%; object-fit: cover; display: none; border-radius: 18px; }
#album-placeholder-icon { opacity: 0.2; }

#track-meta { width: 100%; }
#track-name {
  font-size: 17px; font-weight: 500; color: var(--text);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  letter-spacing: -0.3px;
  text-shadow: 0 1px 8px rgba(0,0,0,0.3);
}
#track-artist {
  font-size: 13px; color: var(--text2);
  margin-top: 3px; white-space: nowrap;
  overflow: hidden; text-overflow: ellipsis; font-weight: 300;
}

#progress-section { margin-top: 12px; }
#progress-track {
  height: 3px; background: rgba(255,255,255,0.1);
  border-radius: 2px; overflow: hidden;
}
#progress-fill {
  height: 100%; background: rgba(255,255,255,0.7);
  border-radius: 2px; width: 0%; transition: width 1s linear;
}
#progress-labels {
  display: flex; justify-content: space-between;
  margin-top: 5px; font-size: 10px; color: var(--text3);
  font-family: var(--font-mono);
}

/* LIQUID GLASS PLAYER CONTROLS */
#player-controls {
  display: flex; align-items: center;
  justify-content: center; gap: 12px; margin-top: 14px;
}

.ctrl {
  background: var(--glass);
  -webkit-backdrop-filter: var(--blur);
  backdrop-filter: var(--blur);
  border: 1px solid var(--glass-border);
  box-shadow: inset 0 1px 0 var(--glass-highlight), 0 4px 12px var(--glass-shadow);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  color: var(--text);
  border-radius: 50%;
  width: 38px; height: 38px;
  transition: all 0.15s; -webkit-appearance: none;
  position: relative; overflow: hidden;
}
.ctrl::before {
  content: '';
  position: absolute;
  top: 0; left: 10%; right: 10%; height: 1px;
  background: linear-gradient(90deg, transparent, var(--glass-highlight), transparent);
}
.ctrl:active { transform: scale(0.92); opacity: 0.8; }

#play-pause-btn {
  width: 54px; height: 54px;
  background: rgba(255,255,255,0.14);
  -webkit-backdrop-filter: blur(40px) saturate(200%);
  backdrop-filter: blur(40px) saturate(200%);
  border: 1px solid rgba(255,255,255,0.35);
  box-shadow:
    inset 0 1.5px 0 rgba(255,255,255,0.6),
    inset 0 -1px 0 rgba(0,0,0,0.2),
    0 8px 24px rgba(0,0,0,0.4),
    0 2px 8px rgba(0,0,0,0.3);
  border-radius: 50%;
  cursor: pointer; display: flex;
  align-items: center; justify-content: center;
  flex-shrink: 0;
  transition: transform 0.12s cubic-bezier(0.34,1.56,0.64,1), opacity 0.15s;
  position: relative; overflow: hidden;
  -webkit-appearance: none;
}
#play-pause-btn::before {
  content: '';
  position: absolute;
  top: 0; left: 15%; right: 15%; height: 1.5px;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.8), transparent);
}
#play-pause-btn::after {
  content: '';
  position: absolute; inset: 0; border-radius: 50%;
  background: linear-gradient(135deg, rgba(255,255,255,0.18) 0%, transparent 50%);
}
#play-pause-btn svg { position: relative; z-index: 1; }
#play-pause-btn:active { transform: scale(0.92); }

#vol-row {
  display: flex; align-items: center;
  gap: 10px; margin-top: 10px;
}
.vol-icon { color: var(--text3); flex-shrink: 0; }
#vol-slider {
  flex: 1; -webkit-appearance: none;
  height: 3px; border-radius: 2px;
  background: rgba(255,255,255,0.1); outline: none;
}
#vol-slider::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 14px; height: 14px;
  border-radius: 50%; background: rgba(255,255,255,0.9);
  cursor: pointer;
  box-shadow: 0 1px 6px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.5);
}

/* RIGHT */
#right-col { display: flex; flex-direction: column; gap: 14px; }

/* LIQUID GLASS APP ICONS */
#maps-card, #siri-card {
  cursor: pointer;
  align-items: center; justify-content: center; gap: 10px;
  transition: transform 0.15s cubic-bezier(0.34,1.56,0.64,1);
  text-align: center;
}
#maps-card { flex: 1; animation-delay: 0.2s; }
#siri-card { animation-delay: 0.22s; flex-shrink: 0; padding: 16px; }
#maps-card:active, #siri-card:active { transform: scale(0.94); }

#maps-icon {
  width: 54px; height: 54px;
  background: linear-gradient(145deg, rgba(52,170,220,0.7), rgba(0,113,227,0.85));
  border-radius: 16px;
  display: flex; align-items: center; justify-content: center;
  border: 1px solid rgba(255,255,255,0.25);
  box-shadow: inset 0 1.5px 0 rgba(255,255,255,0.4), 0 6px 20px rgba(0,113,227,0.35);
  position: relative; overflow: hidden;
}
#maps-icon::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0; height: 50%;
  background: linear-gradient(180deg, rgba(255,255,255,0.28) 0%, transparent 100%);
  border-radius: 16px 16px 0 0;
}

#siri-icon {
  width: 48px; height: 48px;
  background: linear-gradient(145deg, rgba(191,90,242,0.7), rgba(120,60,220,0.85));
  border-radius: 14px;
  display: flex; align-items: center; justify-content: center;
  border: 1px solid rgba(255,255,255,0.25);
  box-shadow: inset 0 1.5px 0 rgba(255,255,255,0.4), 0 6px 20px rgba(155,89,245,0.4);
  position: relative; overflow: hidden;
}
#siri-icon::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0; height: 50%;
  background: linear-gradient(180deg, rgba(255,255,255,0.3) 0%, transparent 100%);
  border-radius: 14px 14px 0 0;
}

#maps-label, #siri-label {
  font-size: 14px; font-weight: 500;
  color: var(--text); letter-spacing: -0.2px;
}
#maps-sub, #siri-sub { font-size: 11px; color: var(--text3); font-weight: 300; }

#time-card {
  animation-delay: 0.25s;
  flex-direction: row; align-items: center;
  justify-content: space-between;
  padding: 14px 18px; flex-shrink: 0; min-height: 58px;
}
#speed-val {
  font-size: 28px; font-weight: 200; color: var(--text);
  letter-spacing: -1px; font-variant-numeric: tabular-nums;
  text-shadow: 0 2px 12px rgba(255,255,255,0.2);
}
#speed-unit {
  font-size: 10px; color: var(--text3); font-weight: 400;
  display: block; letter-spacing: 0.5px; text-transform: uppercase;
}
#gps-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--text3); flex-shrink: 0;
}
#gps-dot.active { background: var(--accent); box-shadow: 0 0 0 3px rgba(48,209,88,0.2); }

/* SETUP */
#setup-screen {
  position: fixed; inset: 0;
  z-index: 100;
  display: flex; align-items: center; justify-content: center;
  padding: 32px;
}

#setup-box {
  background: rgba(255,255,255,0.08);
  -webkit-backdrop-filter: blur(60px) saturate(200%);
  backdrop-filter: blur(60px) saturate(200%);
  border: 1px solid rgba(255,255,255,0.2);
  border-radius: var(--radius);
  box-shadow: inset 0 1.5px 0 rgba(255,255,255,0.35), 0 24px 64px rgba(0,0,0,0.5);
  padding: 36px 40px;
  width: 100%; max-width: 420px;
  display: flex; flex-direction: column;
  gap: 18px; align-items: center;
  position: relative; z-index: 1;
  animation: fadeUp 0.5s cubic-bezier(0.16,1,0.3,1) both;
}
#setup-box::before {
  content: '';
  position: absolute; top: 0; left: 8%; right: 8%;
  height: 1.5px;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.7), transparent);
}

#setup-logo {
  width: 52px; height: 52px;
  background: rgba(255,255,255,0.12);
  border: 1px solid rgba(255,255,255,0.25);
  border-radius: 14px;
  display: flex; align-items: center; justify-content: center;
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.4);
}
#setup-title { font-size: 24px; font-weight: 300; color: var(--text); letter-spacing: -0.5px; }
#setup-desc { font-size: 13px; color: var(--text2); text-align: center; line-height: 1.6; font-weight: 300; }

#setup-redirect-box {
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: var(--radius-sm);
  padding: 12px 16px; width: 100%;
}
#setup-redirect-label { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 4px; }
#setup-redirect-val { font-size: 12px; color: var(--text2); font-family: var(--font-mono); word-break: break-all; line-height: 1.5; }

#setup-input {
  width: 100%;
  background: rgba(255,255,255,0.07);
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: var(--radius-sm);
  padding: 14px 18px; font-size: 15px;
  font-family: var(--font); color: var(--text); outline: none;
  transition: border-color 0.2s;
}
#setup-input:focus { border-color: rgba(255,255,255,0.35); }
#setup-input::placeholder { color: var(--text3); }

#setup-cta {
  width: 100%;
  background: rgba(255,255,255,0.12);
  border: 1px solid rgba(255,255,255,0.25);
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.3), 0 4px 16px rgba(0,0,0,0.3);
  color: var(--text); border-radius: 50px;
  padding: 15px; font-size: 16px; font-weight: 400;
  cursor: pointer; font-family: var(--font);
  transition: all 0.15s; -webkit-appearance: none;
  position: relative; overflow: hidden;
}
#setup-cta::before {
  content: '';
  position: absolute; top: 0; left: 10%; right: 10%; height: 1px;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.7), transparent);
}
#setup-cta:active { transform: scale(0.98); opacity: 0.85; }

#setup-skip-btn { font-size: 13px; color: var(--text3); background: none; border: none; cursor: pointer; font-family: var(--font); font-weight: 300; }

.hidden { display: none !important; }
</style>
</head>
<body>

<!-- ROTATE HINT -->
<div id="rotate-msg">
  <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#1c1c1e" stroke-width="1.2">
    <rect x="4" y="2" width="16" height="20" rx="3"/>
    <line x1="8" y1="20" x2="16" y2="20"/>
  </svg>
  <p>Ruota il dispositivo in orizzontale</p>
</div>

<!-- SETUP -->
<div id="setup-screen">
  <div id="setup-box">
    <div id="setup-logo">
      <svg width="26" height="26" viewBox="0 0 24 24" fill="white"><path d="M18.92 6.01C18.72 5.42 18.16 5 17.5 5h-11c-.66 0-1.21.42-1.42 1.01L3 12v8c0 .55.45 1 1 1h1c.55 0 1-.45 1-1v-1h12v1c0 .55.45 1 1 1h1c.55 0 1-.45 1-1v-8l-2.08-5.99zM6.85 7h10.29l1.08 3.11H5.77L6.85 7zM19 17H5v-5h14v5zm-8-3.5c0 .83-.67 1.5-1.5 1.5S8 14.33 8 13.5 8.67 12 9.5 12s1.5.67 1.5 1.5zm7 0c0 .83-.67 1.5-1.5 1.5s-1.5-.67-1.5-1.5.67-1.5 1.5-1.5 1.5.67 1.5 1.5z"/></svg>
    </div>
    <div id="setup-title">CarDash</div>
    <div id="setup-desc">Per connettere Spotify, aggiungi questo URL come Redirect URI nel tuo Spotify Developer Dashboard.</div>
    <div id="setup-redirect-box">
      <div id="setup-redirect-label">Redirect URI</div>
      <div id="setup-redirect-val"></div>
    </div>
    <input id="setup-input" type="text" placeholder="Incolla il tuo Client ID" autocomplete="off" autocorrect="off" spellcheck="false" />
    <button id="setup-cta" onclick="saveClientId()">Continua</button>
    <button id="setup-skip-btn" onclick="skipSetup()">Continua senza Spotify</button>
  </div>
</div>

<!-- APP -->
<div id="app">

  <!-- LEFT -->
  <div id="left-col">
    <div class="card" id="clock-card">
      <div>
        <div id="clock-time">--:--</div>
        <div id="clock-date"></div>
      <div id="theme-toggle" onclick="toggleTheme()">
        <div id="theme-knob"></div>
        <div class="theme-opt active" data-mode="dark">🌙</div>
        <div class="theme-opt" data-mode="light">☀️</div>
      </div>
      </div>
      <div id="battery-row">
        <div id="battery-icon"><div id="battery-fill" style="width:50%"></div></div>

      </div>
    </div>
    <div class="card" id="weather-card">
      <div id="wx-icon">🌤</div>
      <div id="wx-info">
        <div id="wx-temp">--°</div>
        <div id="wx-desc">Caricamento…</div>
      </div>
    </div>
  </div>

  <!-- CENTER -->
  <div id="center-col">
    <div class="card" id="spotify-card">

      <!-- NOT LOGGED -->
      <div id="spotify-login-state">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="#1db954"><path d="M12 2C6.477 2 2 6.477 2 12s4.477 10 10 10 10-4.477 10-10S17.523 2 12 2zm4.586 14.424a.623.623 0 01-.857.207c-2.348-1.435-5.304-1.76-8.785-.964a.623.623 0 01-.277-1.215c3.809-.87 7.076-.496 9.712 1.115a.624.624 0 01.207.857zm1.223-2.722a.78.78 0 01-1.072.257c-2.687-1.652-6.785-2.131-9.965-1.166a.78.78 0 01-.973-.519.781.781 0 01.52-.972c3.632-1.102 8.147-.568 11.233 1.328a.78.78 0 01.257 1.072zm.105-2.835C14.692 9.15 9.375 8.977 6.297 9.9a.937.937 0 11-.543-1.794c3.532-1.072 9.404-.865 13.115 1.338a.937.937 0 01-.955 1.623z"/></svg>
        <p>Connetti Spotify</p>
        <button id="login-btn" onclick="startSpotifyAuth()">Accedi</button>
      </div>

      <!-- PLAYER -->
      <div id="spotify-player">
        <div id="album-wrap">
          <svg id="album-placeholder-icon" width="32" height="32" viewBox="0 0 24 24" fill="#999"><path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/></svg>
          <img id="album-img" src="" alt="" />
        </div>
        <div id="track-meta" style="width:100%;">
          <div id="track-name">—</div>
          <div id="track-artist"></div>
          <div id="progress-section">
            <div id="progress-track"><div id="progress-fill"></div></div>
            <div id="progress-labels">
              <span id="prog-cur">0:00</span>
              <span id="prog-tot">0:00</span>
            </div>
          </div>
          <div id="player-controls">
            <button class="ctrl" onclick="prevTrack()">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/></svg>
            </button>
            <button class="ctrl" id="play-pause-btn" onclick="togglePlay()">
              <svg id="ic-play" width="22" height="22" viewBox="0 0 24 24" fill="var(--text)"><path d="M8 5v14l11-7z"/></svg>
              <svg id="ic-pause" width="22" height="22" viewBox="0 0 24 24" fill="var(--text)" style="display:none"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
            </button>
            <button class="ctrl" onclick="nextTrack()">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="m6 18 8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>
            </button>
          </div>
          <div id="vol-row">
            <svg class="vol-icon" width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/></svg>
            <input type="range" id="vol-slider" min="0" max="100" value="50" oninput="setVolume(this.value)" />
            <svg class="vol-icon" width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77 0-4.28-2.99-7.86-7-8.77z"/></svg>
          </div>
        </div>
      </div>

    </div>
  </div>

  <!-- RIGHT -->
  <div id="right-col">
    <div class="card" id="maps-card" onclick="openMaps()">
      <div id="maps-icon">
        <svg width="26" height="26" viewBox="0 0 24 24" fill="white"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>
      </div>
      <div id="maps-label">Maps</div>
      <div id="maps-sub">Tocca per navigare</div>
    </div>
    <div class="card" id="siri-card" onclick="openSiri()">
      <div id="siri-icon">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="white"><path d="M12 2a3 3 0 0 1 3 3v6a3 3 0 0 1-6 0V5a3 3 0 0 1 3-3zm7 9a1 1 0 0 1 1 1 8 8 0 0 1-7 7.938V22h-2v-2.062A8 8 0 0 1 4 12a1 1 0 1 1 2 0 6 6 0 0 0 12 0 1 1 0 0 1 1-1z"/></svg>
      </div>
      <div id="siri-label">Siri</div>
      <div id="siri-sub">Tieni premuto</div>
    </div>
    <div class="card" id="time-card">
      <div>
        <span id="speed-val">--</span>
        <span id="speed-unit">km/h</span>
      </div>
      <div id="gps-dot"></div>
    </div>
  </div>

</div>

<script>
const CLIENT_ID_KEY = 'cd_cid';
const TOKEN_KEY = 'cd_tok';
const EXPIRES_KEY = 'cd_exp';
const VERIFIER_KEY = 'cd_ver';
const REFRESH_KEY = 'cd_ref';
const REDIRECT_URI = window.location.href.split('?')[0].split('#')[0];

let isPlaying = false;
let currentProgress = 0, currentDuration = 1;
let progressTick = null, pollTimer = null;

// Redirect URI display
document.getElementById('setup-redirect-val').textContent = REDIRECT_URI;

// ── SETUP ──
function saveClientId() {
  const v = document.getElementById('setup-input').value.trim();
  if (!v) return;
  localStorage.setItem(CLIENT_ID_KEY, v);
  document.getElementById('setup-screen').classList.add('hidden');
}
function skipSetup() {
  document.getElementById('setup-screen').classList.add('hidden');
}

// ── CLOCK ──
function tick() {
  const n = new Date();
  const h = String(n.getHours()).padStart(2,'0');
  const m = String(n.getMinutes()).padStart(2,'0');
  document.getElementById('clock-time').textContent = h + ':' + m;
  const days = ['Dom','Lun','Mar','Mer','Gio','Ven','Sab'];
  const months = ['Gen','Feb','Mar','Apr','Mag','Giu','Lug','Ago','Set','Ott','Nov','Dic'];
  document.getElementById('clock-date').textContent =
    days[n.getDay()] + ' ' + n.getDate() + ' ' + months[n.getMonth()];
}
tick(); setInterval(tick, 10000);

// ── BATTERY ──
async function initBattery() {
  if (!navigator.getBattery) return;
  try {
    const b = await navigator.getBattery();
    const update = () => {
      const p = Math.round(b.level * 100);
      document.getElementById('battery-fill').style.width = p + '%';
      document.getElementById('battery-fill').style.background = p < 20 ? '#ff3b30' : '#30d158';
    };
    update();
    b.addEventListener('levelchange', update);
  } catch(e) {}
}
initBattery();

// ── GPS SPEED ──
if (navigator.geolocation) {
  navigator.geolocation.watchPosition(pos => {
    const dot = document.getElementById('gps-dot');
    dot.classList.add('active');
    const spd = pos.coords.speed != null ? Math.round(pos.coords.speed * 3.6) : '--';
    document.getElementById('speed-val').textContent = spd;
  }, () => {}, { enableHighAccuracy: true });
}

// ── WEATHER ──
async function loadWeather() {
  try {
    let lat = 44.4, lon = 8.9;
    if (navigator.geolocation) {
      await new Promise(res => navigator.geolocation.getCurrentPosition(
        p => { lat = p.coords.latitude; lon = p.coords.longitude; res(); },
        () => res(), { timeout: 5000 }
      ));
    }
    const r = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true&forecast_days=1`);
    const d = await r.json();
    const t = Math.round(d.current_weather.temperature);
    const c = d.current_weather.weathercode;
    document.getElementById('wx-temp').textContent = t + '°';
    document.getElementById('wx-desc').textContent = wmoDesc(c);
    document.getElementById('wx-icon').textContent = wmoIcon(c);
  } catch(e) { document.getElementById('wx-desc').textContent = '—'; }
}
function wmoDesc(c) {
  if(c===0) return 'Sereno';if(c<=2) return 'Parz. nuvoloso';if(c<=3) return 'Nuvoloso';
  if(c<=49) return 'Nebbia';if(c<=59) return 'Pioggerella';if(c<=69) return 'Pioggia';
  if(c<=79) return 'Neve';if(c<=82) return 'Rovesci';return 'Temporale';
}
function wmoIcon(c) {
  if(c===0) return '☀️';if(c<=2) return '⛅';if(c<=3) return '☁️';
  if(c<=49) return '🌫';if(c<=69) return '🌧';if(c<=79) return '❄️';return '⛈';
}
loadWeather();


// ── THEME ──
function toggleTheme() {
  const root = document.documentElement;
  const isLight = root.getAttribute('data-theme') === 'light';
  const knob = document.getElementById('theme-knob');
  const opts = document.querySelectorAll('.theme-opt');
  if (isLight) {
    root.removeAttribute('data-theme');
    knob.style.transform = 'translateX(0px)';
    opts[0].classList.add('active');
    opts[1].classList.remove('active');
    localStorage.setItem('cd_theme', 'dark');
  } else {
    root.setAttribute('data-theme', 'light');
    knob.style.transform = 'translateX(34px)';
    opts[0].classList.remove('active');
    opts[1].classList.add('active');
    localStorage.setItem('cd_theme', 'light');
  }
}

// ── SIRI ──
function openSiri() { window.location.href = "siri:"; }

// ── MAPS ──
function openMaps() { window.open('https://maps.google.com', '_blank'); }

// ── SPOTIFY PKCE ──
function rndVerifier(n=128) {
  const a='ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789-._~';
  const b=new Uint8Array(n); crypto.getRandomValues(b);
  return Array.from(b).map(x=>a[x%a.length]).join('');
}
async function pkceChallenge(v) {
  const h=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(v));
  return btoa(String.fromCharCode(...new Uint8Array(h))).replace(/=/g,'').replace(/\+/g,'-').replace(/\//g,'_');
}

async function startSpotifyAuth() {
  let cid = localStorage.getItem(CLIENT_ID_KEY);
  if (!cid) { cid = prompt('Client ID Spotify:'); if(!cid) return; localStorage.setItem(CLIENT_ID_KEY, cid.trim()); }
  const ver = rndVerifier();
  localStorage.setItem(VERIFIER_KEY, ver);
  const ch = await pkceChallenge(ver);
  const p = new URLSearchParams({
    client_id: cid, response_type:'code', redirect_uri: REDIRECT_URI,
    code_challenge_method:'S256', code_challenge: ch,
    scope:'user-read-playback-state user-modify-playback-state user-read-currently-playing'
  });
  window.location.href = 'https://accounts.spotify.com/authorize?' + p;
}

async function exchangeCode(code) {
  const ver = localStorage.getItem(VERIFIER_KEY);
  const cid = localStorage.getItem(CLIENT_ID_KEY);
  const body = new URLSearchParams({ grant_type:'authorization_code', code, redirect_uri:REDIRECT_URI, client_id:cid, code_verifier:ver });
  const r = await fetch('https://accounts.spotify.com/api/token',{ method:'POST', headers:{'Content-Type':'application/x-www-form-urlencoded'}, body:body.toString() });
  const d = await r.json();
  if (d.access_token) {
    localStorage.setItem(TOKEN_KEY, d.access_token);
    localStorage.setItem(EXPIRES_KEY, Date.now() + d.expires_in*1000);
    if (d.refresh_token) localStorage.setItem(REFRESH_KEY, d.refresh_token);
    history.replaceState({}, '', REDIRECT_URI);
    showPlayer();
  }
}

async function refreshAccessToken() {
  const rt = localStorage.getItem(REFRESH_KEY);
  const cid = localStorage.getItem(CLIENT_ID_KEY);
  if (!rt || !cid) return false;
  const body = new URLSearchParams({ grant_type:'refresh_token', refresh_token:rt, client_id:cid });
  const r = await fetch('https://accounts.spotify.com/api/token',{ method:'POST', headers:{'Content-Type':'application/x-www-form-urlencoded'}, body:body.toString() });
  const d = await r.json();
  if (d.access_token) { localStorage.setItem(TOKEN_KEY, d.access_token); localStorage.setItem(EXPIRES_KEY, Date.now()+d.expires_in*1000); return true; }
  return false;
}

async function getToken() {
  if (Date.now() > (parseInt(localStorage.getItem(EXPIRES_KEY)||0) - 60000)) {
    const ok = await refreshAccessToken(); if (!ok) return null;
  }
  return localStorage.getItem(TOKEN_KEY);
}

async function api(method, path, body) {
  const tok = await getToken(); if (!tok) return null;
  const opts = { method, headers:{'Authorization':'Bearer '+tok} };
  if (body) { opts.body=JSON.stringify(body); opts.headers['Content-Type']='application/json'; }
  const r = await fetch('https://api.spotify.com/v1'+path, opts);
  if (r.status===204||r.status===202) return {};
  if (r.ok) return r.json().catch(()=>({}));
  return null;
}

async function poll() {
  const d = await api('GET','/me/player?additional_types=track');
  if (!d || !d.item) return;
  const item = d.item;
  document.getElementById('track-name').textContent = item.name;
  document.getElementById('track-artist').textContent = item.artists.map(a=>a.name).join(', ');
  currentDuration = item.duration_ms;
  currentProgress = d.progress_ms;
  isPlaying = d.is_playing;
  const img = item.album.images[0]?.url;
  if (img) {
    document.getElementById('album-img').src = img;
    document.getElementById('album-img').style.display = 'block';
    document.getElementById('album-placeholder-icon').style.display = 'none';
    document.getElementById('spotify-card').style.setProperty('--art-url','url('+img+')');
    document.getElementById('spotify-card').classList.add('has-art');
    document.getElementById('spotify-card').style.cssText += '; --before-bg:url('+img+')';
  }
  updateProgressUI();
  updatePlayPause();
  document.getElementById('vol-slider').value = d.device?.volume_percent ?? 50;
  if (isPlaying) startTick(); else clearInterval(progressTick);
}

function updateProgressUI() {
  const pct = currentDuration>0 ? (currentProgress/currentDuration)*100 : 0;
  document.getElementById('progress-fill').style.width = pct+'%';
  document.getElementById('prog-cur').textContent = msMin(currentProgress);
  document.getElementById('prog-tot').textContent = msMin(currentDuration);
}
function msMin(ms) { const s=Math.floor(ms/1000); return Math.floor(s/60)+':'+String(s%60).padStart(2,'0'); }
function startTick() {
  clearInterval(progressTick);
  progressTick = setInterval(() => { currentProgress=Math.min(currentProgress+1000,currentDuration); updateProgressUI(); }, 1000);
}
function updatePlayPause() {
  document.getElementById('ic-play').style.display = isPlaying?'none':'block';
  document.getElementById('ic-pause').style.display = isPlaying?'block':'none';
}

async function togglePlay() {
  if (isPlaying) { await api('PUT','/me/player/pause'); isPlaying=false; clearInterval(progressTick); }
  else { await api('PUT','/me/player/play'); isPlaying=true; startTick(); }
  updatePlayPause();
}
async function nextTrack() { await api('POST','/me/player/next'); setTimeout(poll,700); }
async function prevTrack() { await api('POST','/me/player/previous'); setTimeout(poll,700); }

let volTimeout;
function setVolume(v) {
  clearTimeout(volTimeout);
  volTimeout = setTimeout(()=>api('PUT','/me/player/volume?volume_percent='+Math.round(v)),400);
}

function showPlayer() {
  document.getElementById('spotify-login-state').classList.add('hidden');
  document.getElementById('spotify-player').style.display = 'flex';
  poll();
  pollTimer = setInterval(poll, 10000);
}

// ── WAKE LOCK ──
async function keepAwake() {
  if ('wakeLock' in navigator) {
    try { await navigator.wakeLock.request('screen'); } catch(e) {}
  }
}
keepAwake();
document.addEventListener('visibilitychange', ()=>{ if(document.visibilityState==='visible') keepAwake(); });

// ── INIT ──
window.addEventListener('load', () => {
  const savedTheme = localStorage.getItem('cd_theme');
  if (savedTheme === 'light') {
    document.documentElement.setAttribute('data-theme','light');
    const knob = document.getElementById('theme-knob');
    if (knob) { knob.style.transform = 'translateX(34px)'; }
    const opts = document.querySelectorAll('.theme-opt');
    if (opts.length) { opts[0].classList.remove('active'); opts[1].classList.add('active'); }
  }

  const params = new URLSearchParams(window.location.search);
  const code = params.get('code');
  if (code) {
    document.getElementById('setup-screen').classList.add('hidden');
    exchangeCode(code);
    return;
  }
  const tok = localStorage.getItem(TOKEN_KEY);
  const cid = localStorage.getItem(CLIENT_ID_KEY);
  if (tok && cid) { document.getElementById('setup-screen').classList.add('hidden'); showPlayer(); return; }
  if (!cid) { document.getElementById('setup-screen').classList.remove('hidden'); }
  else { document.getElementById('setup-screen').classList.add('hidden'); }
});
</script>
</body>
</html>
